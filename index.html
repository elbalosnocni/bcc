<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Chấm Công</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

h2 {
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 320px;
    font-size: 16px;
    margin-top: 15px;
}

#summary {
    margin-top: 10px;
    font-weight: bold;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 95%;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
}

th {
    background: #4CAF50;
    color: white;
}

.name-row {
    background: #e8f5e9;
    font-weight: bold;
}

.error {
    color: red;
}
</style>
</head>

<body>

<h2>🔎 BẢNG CHẤM CÔNG</h2>
<div style="margin-top:10px">
    <p>📱 Quét QR để tra cứu nhanh</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://elbalosnocni.github.io/bcc/" alt="QR Code">
</div>    
<p>Nhập tên hoặc mã chấm công</p>

<input type="text" id="search" placeholder="VD: HR028 hoặc VU">

<div id="summary"></div>

<table id="result">
<thead>
<tr>
    <th>Ngày</th>
    <th>Mã</th>
    <th>Họ và Tên</th>
    <th>Phòng</th>
    <th>Bộ phận</th>
    <th>Lỗi</th>
    <th>Ghi chú</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
let data = [];

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1Wr62GWAavPWXr4Q3SpSL4JhYIc7z8aiKgWzcJahft45bmxvPnBD7qFHCEMNWhXtBaTCIbDgbV6lh/pub?gid=0&single=true&output=csv";

// bỏ dấu tiếng Việt
function removeVietnamese(str) {
    return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// load data
fetch(sheetURL)
.then(res => res.text())
.then(csv => {
    const parsed = Papa.parse(csv, {
        header: true,
        skipEmptyLines: true
    });

    data = parsed.data;
});

// search
document.getElementById('search').addEventListener('input', function() {

    let keyword = removeVietnamese(this.value.toLowerCase());

    let filtered = data.filter(d => {
        let ma = d["Mã"] || "";
        let ten = d["Họ và Tên"] || "";

        return removeVietnamese(ma.toLowerCase()).includes(keyword) ||
               removeVietnamese(ten.toLowerCase()).includes(keyword);
    });

    // GROUP THEO NHÂN VIÊN
    let grouped = {};

    filtered.forEach(d => {
        let key = d["Mã"] + "_" + d["Họ và Tên"];

        if (!grouped[key]) {
            grouped[key] = [];
        }

        grouped[key].push(d);
    });

    let html = "";
    let total = 0;

    for (let key in grouped) {
        let rows = grouped[key];

        // dòng tiêu đề nhân viên
        html += `
        <tr class="name-row">
            <td colspan="7">${rows[0]["Họ và Tên"]} (Mã: ${rows[0]["Mã"]}) - Tổng lỗi: ${rows.length}</td>
        </tr>
        `;

        rows.forEach(d => {
            total++;

            html += `
            <tr>
                <td>${d["Ngày"] || ""}</td>
                <td>${d["Mã"] || ""}</td>
                <td>${d["Họ và Tên"] || ""}</td>
                <td>${d["Phòng"] || ""}</td>
                <td>${d["Bộ phận"] || ""}</td>
                <td class="error">${d["Lỗi"] || ""}</td>
                <td>${d["Ghi Chú"] || ""}</td>
            </tr>`;
        });
    }

    document.querySelector("#result tbody").innerHTML = html;
    document.getElementById("summary").innerText = "Tổng số lỗi: " + total;
});

// auto refresh 60s
setInterval(() => location.reload(), 60000);

</script>

</body>
</html>
