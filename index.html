<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Chấm Công</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .header-container {
            position: relative;
            background: #1b4985;
            color: white;
            padding: 20px 15px;
            border-radius: 12px;
            max-width: 800px;
            margin: 0 auto 20px auto;
        }

        .header-container h2 { margin: 0 0 5px 0; font-size: 22px; }

        .admin-gear-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .admin-gear-btn:hover { color: #ffffff; transform: rotate(45deg); }

        input[type="text"], input[type="password"] {
            padding: 10px;
            width: 320px;
            max-width: 90%;
            font-size: 16px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #summary { margin: 10px 0; font-weight: bold; }

        .table-container {
            max-height: 650px;
            overflow: auto;
            width: 98%;
            margin: 20px auto;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; white-space: nowrap; }
        thead { position: sticky; top: 0; z-index: 10; }
        th { background: #2e7d32; color: #fff; }
        tbody tr:nth-child(even) { background: #fafafa; }

        /* MODAL POPUP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; visibility: hidden; opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active { visibility: visible; opacity: 1; }

        .modal-card {
            background: white; width: 90%; max-width: 380px;
            padding: 25px 20px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative; text-align: left;
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 18px; color: #333; }
        .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-top: 0; }

        .btn-login {
            width: 100%; padding: 12px; background: #1877f2; color: white;
            border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px;
        }
        .btn-login:hover { background: #166fe5; }
        .login-error { color: #d32f2f; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>

<body>

    <div class="header-container">
        <h2>BẢNG CHẤM CÔNG</h2>
        <div style="font-size: 13px; opacity: 0.9;">P. Nhân sự: 02743.743.118 - Nhánh 119</div>
        <button class="admin-gear-btn" onclick="openLoginModal()" title="Đăng nhập Quản trị">⚙</button>
    </div>

    <div style="margin-top:10px">
        <p style="margin:5px 0;">📱 Quét QR để tra cứu nhanh</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://elbalosnocni.github.io/bcc/" alt="QR Code">
    </div>    
    
    <p style="margin-top: 15px;">Nhập tên hoặc mã chấm công</p>
    <input type="text" id="search" placeholder="VD: HR028 hoặc NGUYEN VAN A">

    <div style="margin: 15px 0;">
        <label for="monthSelect" style="font-weight: bold; margin-right: 8px;">📅 Chọn Tháng:</label>
        <select id="monthSelect" onchange="changeMonth()" style="padding: 8px 12px; font-size: 15px; border-radius: 6px; border: 1px solid #007bff; background: #fff; cursor: pointer;">
            <option value="">⏳ Đang tải danh sách tháng...</option>
        </select>
    </div>

    <div id="summary"></div>

    <div class="table-container">
        <table id="result">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- MODAL POPUP ĐĂNG NHẬP ADMIN -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Đăng nhập quản trị</h3>
                <button class="close-btn" onclick="closeLoginModal()">&times;</button>
            </div>
            
            <div class="form-group">
                <label>Mật khẩu Admin</label>
                <input type="password" id="adminPass" placeholder="Nhập mật khẩu">
            </div>

            <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>
            
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzWrC2s_E9WRa2zF0-9X7iowz6-gjOJ5CRkbATIP2QqKKPZnKVDUt_ggrrckDAJq6xCLA/exec";

        let data = [];
        let headers = [];

        function removeVietnamese(str) {
            return (str || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .replace(/Đ/g, "D");
        }

        function createHeader() {
            if (!headers || headers.length === 0) return;
            let html = "<tr>";
            headers.forEach(h => { html += `<th>${h}</th>`; });
            html += "</tr>";
            document.querySelector("#result thead").innerHTML = html;
        }

        function renderTable(listData) {
            let html = "";
            listData.forEach(r => {
                html += "<tr>";
                headers.forEach(col => {
                    html += `<td>${r[col] || ""}</td>`;
                });
                html += "</tr>";
            });

            document.querySelector("#result tbody").innerHTML = html;
            document.getElementById("summary").innerHTML = `Hiển thị <b>${listData.length}</b> dòng`;
        }

        document.getElementById("search").addEventListener("input", function () {
            const rawKeyword = this.value.trim();
            const keyword = removeVietnamese(rawKeyword.toLowerCase());

            let filtered = data;
            if (keyword !== "") {
                filtered = data.filter(r => {
                    return headers.some(col =>
                        removeVietnamese(String(r[col] || "").toLowerCase()).includes(keyword)
                    );
                });
            }

            renderTable(filtered);
        });

        async function loadMonthList() {
            try {
                const res = await fetch(`${GAS_WEB_APP_URL}?action=getMonths`);
                const months = await res.json();
                
                const select = document.getElementById("monthSelect");
                select.innerHTML = "";
                
                if (Array.isArray(months) && months.length > 0) {
                    months.forEach(m => {
                        const opt = document.createElement("option");
                        opt.value = m;
                        opt.innerText = m;
                        select.appendChild(opt);
                    });
                    loadDataByMonth(months[0]);
                } else {
                    select.innerHTML = "<option>Không có dữ liệu tháng</option>";
                }
            } catch (err) {
                console.error("Lỗi lấy danh sách tháng:", err);
                document.getElementById("summary").innerText = "❌ Lỗi tải danh sách tháng!";
            }
        }

        async function loadDataByMonth(monthName) {
            document.getElementById("summary").innerHTML = "⏳ Đang tải dữ liệu...";
            document.querySelector("#result tbody").innerHTML = "";

            try {
                const res = await fetch(`${GAS_WEB_APP_URL}?month=${encodeURIComponent(monthName)}`);
                const rawRows = await res.json();

                if (rawRows && rawRows.length > 0) {
                    headers = rawRows[0];
                    data = rawRows.slice(1).map(row => {
                        let obj = {};
                        headers.forEach((h, index) => {
                            obj[h] = row[index] || "";
                        });
                        return obj;
                    });

                    document.getElementById("search").value = "";
                    createHeader();
                    renderTable(data);
                } else {
                    document.getElementById("summary").innerText = "Tháng này chưa có dữ liệu!";
                }
            } catch (err) {
                console.error("Lỗi tải dữ liệu tháng:", err);
                document.getElementById("summary").innerText = "❌ Lỗi khi tải bảng công!";
            }
        }

        function changeMonth() {
            const selectedMonth = document.getElementById("monthSelect").value;
            if (selectedMonth) {
                loadDataByMonth(selectedMonth);
            }
        }

        loadMonthList();

        function openLoginModal() {
            document.getElementById("loginModal").classList.add("active");
        }

        function closeLoginModal() {
            document.getElementById("loginModal").classList.remove("active");
            document.getElementById("loginError").style.display = "none";
            document.getElementById("adminPass").value = "";
        }

        // HÀM XÁC THỰC ĐĂNG NHẬP MỚI VỚI APPS SCRIPT
        async function handleLogin() {
            const passwordInput = document.getElementById("adminPass").value.trim();
            const errorMsg = document.getElementById("loginError");

            if (!passwordInput) {
                alert("Vui lòng nhập mật khẩu!");
                return;
            }

            errorMsg.style.display = "block";
            errorMsg.style.color = "#1565c0";
            errorMsg.innerText = "⏳ Đang kiểm tra mật khẩu...";

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "checkPassword",
                        password: passwordInput
                    })
                });

                const result = await response.json();

                if (result.success) {
                    sessionStorage.setItem("adminPass", passwordInput);
                    window.location.href = "admin.html";
                } else {
                    errorMsg.style.color = "#d32f2f";
                    errorMsg.innerText = "❌ " + (result.message || "Mật khẩu không chính xác!");
                }
            } catch (err) {
                console.error(err);
                errorMsg.style.color = "#d32f2f";
                errorMsg.innerText = "❌ Lỗi kết nối máy chủ!";
            }
        }
    </script>
</body>
</html>
