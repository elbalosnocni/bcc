<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Chấm Công</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        /* --- HEADER & NÚT BÁNH RĂNG --- */
        .header-container {
            position: relative;
            background: #1b4985;
            color: white;
            padding: 20px 15px;
            border-radius: 12px;
            max-width: 800px;
            margin: 0 auto 20px auto;
        }

        .header-container h2 {
            margin: 0 0 5px 0;
            font-size: 22px;
        }

        /* Nút Bánh răng Admin góc trên bên phải */
        .admin-gear-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .admin-gear-btn:hover {
            color: #ffffff;
            transform: rotate(45deg);
        }

        /* --- FORM TÌM KIẾM & BẢNG DỮ LIỆU --- */
        input[type="text"] {
            padding: 10px;
            width: 320px;
            max-width: 90%;
            font-size: 16px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #summary {
            margin: 10px 0;
            font-weight: bold;
        }

        .table-container {
            max-height: 650px;
            overflow: auto;
            width: 98%;
            margin: 20px auto;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            white-space: nowrap;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: #2e7d32;
            color: #fff;
        }

        tbody tr:nth-child(even) {
            background: #fafafa;
        }

        /* --- POPUP MODAL ĐĂNG NHẬP ADMIN --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: white;
            width: 90%;
            max-width: 380px;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            text-align: left;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #888;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 0;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 5px;
        }

        .btn-login:hover {
            background: #166fe5;
        }

        .login-error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>

    <!-- HEADER + NÚT BÁNH RĂNG -->
    <div class="header-container">
        <h2>🔎 BẢNG CHẤM CÔNG</h2>
        <div style="font-size: 13px; opacity: 0.9;">Hệ thống Tra cứu Công & Tải dữ liệu</div>
        
        <!-- Nút Bánh răng -->
        <button class="admin-gear-btn" onclick="openLoginModal()" title="Đăng nhập Quản trị">⚙</button>
    </div>

    <!-- QR CODE & TÌM KIẾM -->
    <div style="margin-top:10px">
        <p style="margin:5px 0;">📱 Quét QR để tra cứu nhanh</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://elbalosnocni.github.io/bcc/" alt="QR Code">
    </div>    
    <p style="margin-top: 15px;">Nhập tên hoặc mã chấm công</p>

    <input type="text" id="search" placeholder="VD: HR028 hoặc NGUYEN VAN VU">

    <div id="summary"></div>

    <!-- BẢNG DỮ LIỆU -->
    <div class="table-container">
        <table id="result">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- MODAL POPUP ĐĂNG NHẬP ADMIN -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Đăng nhập quản trị</h3>
                <button class="close-btn" onclick="closeLoginModal()">&times;</button>
            </div>
            
            <div class="form-group">
                <label>Tài khoản</label>
                <input type="text" id="adminUser" placeholder="Username">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="adminPass" placeholder="Password">
            </div>

            <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>
            
            <div class="login-error" id="loginError">Sai tài khoản hoặc mật khẩu!</div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <script>
        // --- 1. DỮ LIỆU BẢNG TÌM KIẾM ---
        let data = [];
        let headers = [];
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1Wr62GWAavPWXr4Q3SpSL4JhYIc7z8aiKgWzcJahft45bmxvPnBD7qFHCEMNWhXtBaTCIbDgbV6lh/pub?gid=0&single=true&output=csv";

        function removeVietnamese(str) {
            return (str || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .replace(/Đ/g, "D");
        }

        function createHeader() {
            if (!headers || headers.length === 0) return;
            let html = "<tr>";
            headers.forEach(h => { html += `<th>${h}</th>`; });
            html += "</tr>";
            document.querySelector("#result thead").innerHTML = html;
        }

        document.getElementById("search").addEventListener("input", function () {
            const rawKeyword = this.value.trim();
            const keyword = removeVietnamese(rawKeyword.toLowerCase());

            let filtered = data;
            if (keyword !== "") {
                filtered = data.filter(r => {
                    return headers.some(col =>
                        removeVietnamese(String(r[col] || "").toLowerCase()).includes(keyword)
                    );
                });
            }

            let html = "";
            filtered.forEach(r => {
                html += "<tr>";
                headers.forEach(col => {
                    html += `<td>${r[col] || ""}</td>`;
                });
                html += "</tr>";
            });

            document.querySelector("#result tbody").innerHTML = html;
            document.getElementById("summary").innerHTML = `Tìm thấy <b>${filtered.length}</b> dòng`;
        });

        function loadData() {
            fetch(sheetURL)
                .then(res => res.text())
                .then(csv => {
                    const parsed = Papa.parse(csv, { header: true, skipEmptyLines: true });
                    data = parsed.data;
                    headers = parsed.meta.fields;
                    createHeader();
                    document.getElementById("search").dispatchEvent(new Event("input"));
                })
                .catch(err => console.error("Lỗi tải dữ liệu:", err));
        }

        loadData();
        setInterval(loadData, 60000);

        // --- 2. XỬ LÝ MODAL POPUP ĐĂNG NHẬP ---
        function openLoginModal() {
            document.getElementById("loginModal").classList.add("active");
        }

        function closeLoginModal() {
            document.getElementById("loginModal").classList.remove("active");
            document.getElementById("loginError").style.display = "none";
        }

        function handleLogin() {
    const user = document.getElementById("adminUser").value.trim();
    const pass = document.getElementById("adminPass").value.trim();
    const errorDiv = document.getElementById("loginError");

    if (user === "admin" && pass === "123456") { // Thay 123456 bằng MK của bạn
        // Lưu mật khẩu vào bộ nhớ phiên làm việc
        sessionStorage.setItem("adminPass", pass);
        
        // Chuyển hướng sang trang admin
        window.location.href = "admin.html";
    } else {
        errorDiv.style.display = "block";
    }
}
    </script>

</body>
</html>
