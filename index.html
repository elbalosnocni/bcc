<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Chấm Công</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h2 {
            margin-top: 0;
        }

        input {
            padding: 10px;
            width: 320px;
            max-width: 90%;
            font-size: 16px;
            margin-top: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #summary {
            margin: 10px 0;
            font-weight: bold;
        }

        /* Container cuộn cho bảng - Giúp giữ lại Sticky Header */
        .table-container {
            max-height: 650px;
            overflow: auto;
            width: 98%;
            margin: 20px auto;
            border: 1px solid #ddd;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            white-space: nowrap;
        }

        /* Cố định tiêu đề khi cuộn xuống */
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: #2e7d32;
            color: #fff;
        }

        tbody tr:nth-child(even) {
            background: #fafafa;
        }

        .name-row {
            background: #e8f5e9;
            font-weight: bold;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <h2>🔎 BẢNG CHẤM CÔNG</h2>
    <div style="margin-top:10px">
        <p>📱 Quét QR để tra cứu nhanh</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://elbalosnocni.github.io/bcc/" alt="QR Code">
    </div>    
    <p>Nhập tên hoặc mã chấm công</p>

    <input type="text" id="search" placeholder="VD: HR028 hoặc HUYNH THI DIEM MY">

    <div id="summary"></div>

    <!-- Đã chuyển khung cuộn ra thẻ DIV bọc ngoài -->
    <div class="table-container">
        <table id="result">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <script>
        let data = [];
        let headers = [];

        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1Wr62GWAavPWXr4Q3SpSL4JhYIc7z8aiKgWzcJahft45bmxvPnBD7qFHCEMNWhXtBaTCIbDgbV6lh/pub?gid=0&single=true&output=csv";

        function removeVietnamese(str) {
            return (str || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .replace(/Đ/g, "D");
        }

        function createHeader() {
            if (!headers || headers.length === 0) return;
            let html = "<tr>";
            headers.forEach(h => {
                html += `<th>${h}</th>`;
            });
            html += "</tr>";
            document.querySelector("#result thead").innerHTML = html;
        }

        // Sự kiện Tìm kiếm
        document.getElementById("search").addEventListener("input", function () {
            const rawKeyword = this.value.trim();
            const keyword = removeVietnamese(rawKeyword.toLowerCase());

            // Nếu bỏ trống ô tìm kiếm -> Hiện toàn bộ dữ liệu
            let filtered = data;
            if (keyword !== "") {
                filtered = data.filter(r => {
                    return headers.some(col =>
                        removeVietnamese(String(r[col] || "").toLowerCase()).includes(keyword)
                    );
                });
            }

            let html = "";
            filtered.forEach(r => {
                html += "<tr>";
                headers.forEach(col => {
                    const value = r[col] || "";
                    html += `<td>${value}</td>`;
                });
                html += "</tr>";
            });

            document.querySelector("#result tbody").innerHTML = html;
            document.getElementById("summary").innerHTML = `Tìm thấy <b>${filtered.length}</b> dòng`;
        });

        // Hàm tải dữ liệu từ Google Sheets
        function loadData() {
            fetch(sheetURL)
                .then(res => res.text())
                .then(csv => {
                    const parsed = Papa.parse(csv, {
                        header: true,
                        skipEmptyLines: true
                    });

                    data = parsed.data;
                    headers = parsed.meta.fields;

                    createHeader();

                    // Cập nhật lại giao diện theo từ khóa hiện tại
                    document.getElementById("search").dispatchEvent(new Event("input"));
                })
                .catch(err => {
                    console.error("Lỗi tải dữ liệu:", err);
                    document.getElementById("summary").innerHTML = `<span class="error">Không thể tải dữ liệu!</span>`;
                });
        }

        // Tải dữ liệu lần đầu & Tự động cập nhật mỗi 60 giây
        loadData();
        setInterval(loadData, 60000);
    </script>

</body>
</html>
