<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Chấm Công</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

h2 {
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 320px;
    font-size: 16px;
    margin-top: 15px;
}

#summary {
    margin-top: 10px;
    font-weight: bold;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 95%;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
}

th {
    background: #4CAF50;
    color: white;
}

.name-row {
    background: #e8f5e9;
    font-weight: bold;
}

.error {
    color: red;
}
table{
    width:98%;
    margin:auto;
    border-collapse:collapse;
    background:#fff;
    font-size:14px;
}

th,td{
    border:1px solid #ddd;
    padding:6px 8px;
    white-space:nowrap;
}

thead{
    position:sticky;
    top:0;
}

th{
    background:#2e7d32;
    color:#fff;
}

tbody tr:nth-child(even){
    background:#fafafa;
}

.error{
    color:#d32f2f;
    font-weight:bold;
}

.name-row{
    background:#dcedc8;
    font-weight:bold;
}

#result{
    display:block;
    overflow:auto;
    max-height:650px;
}    
</style>
</head>

<body>

<h2>🔎 BẢNG CHẤM CÔNG</h2>
<div style="margin-top:10px">
    <p>📱 Quét QR để tra cứu nhanh</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://elbalosnocni.github.io/bcc/" alt="QR Code">
</div>    
<p>Nhập tên hoặc mã chấm công</p>

<input type="text" id="search" placeholder="VD: HR028 hoặc VU">

<div id="summary"></div>

<table id="result">
    <thead></thead>
    <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
let data = [];
let headers = [];

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1Wr62GWAavPWXr4Q3SpSL4JhYIc7z8aiKgWzcJahft45bmxvPnBD7qFHCEMNWhXtBaTCIbDgbV6lh/pub?gid=0&single=true&output=csv";

function removeVietnamese(str){
    return (str || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/đ/g,"d")
        .replace(/Đ/g,"D");
}

// Load dữ liệu
fetch(sheetURL)
.then(res=>res.text())
.then(csv=>{

    const parsed = Papa.parse(csv,{
        header:true,
        skipEmptyLines:true
    });

    data = parsed.data;
    headers = parsed.meta.fields;

    createHeader();
});

function createHeader(){

    let html="<tr>";

    headers.forEach(h=>{
        html+=`<th>${h}</th>`;
    });

    html+="</tr>";

    document.querySelector("#result thead").innerHTML=html;
}

document.getElementById("search").addEventListener("input",function(){

    const keyword = removeVietnamese(this.value.toLowerCase());

    const filtered = data.filter(r=>{

        return headers.some(col=>{

            return removeVietnamese(String(r[col]||"").toLowerCase())
                    .includes(keyword);

        });

    });

    let grouped={};

    filtered.forEach(r=>{

        const key=(r["Mã"]||"")+"_"+(r["Họ và Tên"]||"");

        if(!grouped[key])
            grouped[key]=[];

        grouped[key].push(r);

    });

    let html="";
    let total=0;

    for(const key in grouped){

        const rows=grouped[key];

        html+=`
        <tr class="name-row">
            <td colspan="${headers.length}">
                ${rows[0]["Họ và Tên"]} (Mã: ${rows[0]["Mã"]})
                - Tổng lỗi: ${rows.length}
            </td>
        </tr>
        `;

        rows.forEach(r=>{

            total++;

            html+="<tr>";

            headers.forEach(col=>{

                let value=r[col]||"";

                if(col==="Lỗi"){
                    html+=`<td class="error">${value}</td>`;
                }else{
                    html+=`<td>${value}</td>`;
                }

            });

            html+="</tr>";

        });

    }

    document.querySelector("#result tbody").innerHTML=html;

    document.getElementById("summary").innerHTML=
        `<b>Tổng số lỗi: ${total}</b>`;

});

setInterval(()=>location.reload(),60000);

</script>

</body>
</html>
